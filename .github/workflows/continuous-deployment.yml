name: Continuous Deployment

permissions:
  contents: read

on:
  workflow_run:
    workflows:
      - Continuous Integration
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: continuous-deployment-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  deploy-worker:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Build Web App
        run: pnpm --filter @azure-burst-monitor/web build

      - name: Type Check API Worker
        run: pnpm --filter @azure-burst-monitor/api typecheck

      - name: Dry Run Deploy with Wrangler
        run: pnpm exec wrangler deploy --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy with Wrangler
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
